spring.application.name=swifthub

# Active profile: 'dev' (H2, zero setup) by default. Override with
# SPRING_PROFILES_ACTIVE=postgres to run against Dockerized Postgres.
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Schema is owned by Flyway migrations (src/main/resources/db/migration).
# Hibernate only validates that entities match the migrated schema.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.flyway.enabled=true

# Spring AI (Claude). Export ANTHROPIC_API_KEY to enable the AI endpoints.
# Haiku 4.5 is cheap + fast, plenty for bios and tag extraction.
spring.ai.anthropic.api-key=${ANTHROPIC_API_KEY:}
spring.ai.anthropic.chat.options.model=claude-haiku-4-5-20251001
