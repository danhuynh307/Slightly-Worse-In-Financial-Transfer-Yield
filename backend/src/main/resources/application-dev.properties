# Dev profile: H2 in-memory in PostgreSQL-compatibility mode so the SAME Flyway
# migrations run here and against real Postgres. Resets on every restart.
spring.datasource.url=jdbc:h2:mem:swifthub;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# DB browser at http://localhost:8080/h2-console (JDBC URL: jdbc:h2:mem:swifthub)
spring.h2.console.enabled=true
