# Postgres profile: connects to the Dockerized Postgres from docker-compose.yml.
# Start it first:  docker compose up -d
# Run the app with: SPRING_PROFILES_ACTIVE=postgres ./mvnw spring-boot:run
spring.datasource.url=jdbc:postgresql://localhost:5432/${DB_NAME:swifthub}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USER:swifthub}
spring.datasource.password=${DB_PASSWORD:swifthub}
