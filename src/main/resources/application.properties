spring.application.name=swifthub

# --- Dev database: H2 in-memory (zero setup) ---
# Boots instantly, resets every restart. Swap to Postgres for deploy (see block below).
spring.datasource.url=jdbc:h2:mem:swifthub;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Browse the DB at http://localhost:8080/h2-console (JDBC URL: jdbc:h2:mem:swifthub)
spring.h2.console.enabled=true

